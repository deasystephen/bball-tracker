name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        project: [backend, mobile]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Generate Prisma client
        if: matrix.project == 'backend'
        working-directory: ${{ matrix.project }}
        run: npx prisma generate

      - name: Run linter
        working-directory: ${{ matrix.project }}
        run: npm run lint

      - name: Type check
        working-directory: ${{ matrix.project }}
        run: npm run type-check

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bball_tracker_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bball_tracker_test
        run: npx prisma migrate deploy
      
      - name: Run tests (with coverage gate)
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bball_tracker_test
          NODE_ENV: test
        run: npm test -- --coverage

  test-mobile:
    name: Test Mobile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Run tests (with coverage gate)
        working-directory: mobile
        run: npm test -- --coverage

      - name: Verify Metro bundle resolves
        working-directory: mobile
        run: npx expo export --platform ios

  detect-changes:
    name: Detect backend changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Only non-markdown changes under these paths produce a new backend
          # container image. Mobile/web-only changes (e.g. nightly dep bumps) and
          # docs-only edits (e.g. a README under backend/ or infra/) must NOT
          # trigger an ECS deploy. `predicate-quantifier: every` makes a file
          # count only if it matches the path brace AND is not a .md file
          # (verified against picomatch, dorny's matcher — a plain `!**/*.md`
          # under the default `some` quantifier would NOT exclude). See #184/#188.
          predicate-quantifier: 'every'
          filters: |
            backend:
              - '{backend/**,infra/**,docker/**,.github/workflows/ci.yml}'
              - '!**/*.md'

  build-and-deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-backend, test-mobile, detect-changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.backend == 'true'
    # Serialize deploys to the shared ECS service. When the nightly upgrade scan
    # merges several PRs within minutes, concurrent deploy jobs would otherwise
    # race and the superseded one fails with a misleading "deployment not found /
    # circuit breaker" error. cancel-in-progress: false so an in-flight
    # production deploy always runs to completion rather than being cancelled
    # mid-rollout.
    concurrency:
      group: ecs-deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: bball-tracker-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -f docker/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Inject SENTRY_RELEASE into task definition
        run: |
          sed -i "s/SENTRY_RELEASE_PLACEHOLDER/${{ github.sha }}/g" infra/task-definition.json

      - name: Render ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/task-definition.json
          container-name: api
          image: ${{ steps.build-image.outputs.image }}

      - name: Upload backend sourcemaps to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: backend
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_BACKEND }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          npm ci
          npx prisma generate
          npm run build
          npx @sentry/cli releases new "$SENTRY_RELEASE"
          # Associate commits with this release so Sentry ingests commit messages
          # and can auto-resolve issues referenced by "Fixes <SENTRY-SHORT-ID>".
          # Requires the GitHub integration + repo linked in Sentry. --auto lets
          # Sentry compute the commit range via the integration; --ignore-missing
          # keeps a force-push/missing-commit edge case from failing the deploy.
          npx @sentry/cli releases set-commits "$SENTRY_RELEASE" --auto --ignore-missing
          npx @sentry/cli sourcemaps upload --release "$SENTRY_RELEASE" ./dist
          npx @sentry/cli releases finalize "$SENTRY_RELEASE"

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_NAME || 'bball-tracker-production-api' }}
          cluster: ${{ vars.ECS_CLUSTER_NAME || 'bball-tracker-production-cluster' }}
          wait-for-service-stability: true
          wait-for-minutes: 10

